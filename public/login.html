<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B — Enter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #1a1814;
      --paper:  #f5f0e8;
      --accent: #c44d2a;
      --muted:  #7a7268;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--ink);
      color: var(--paper);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--paper);
      margin-bottom: 2.5rem;
    }

    .subtitle {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    input[type="password"] {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--muted);
      color: var(--paper);
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      padding: 0.6rem 0.5rem;
      text-align: center;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      border-color: var(--paper);
    }

    input[type="password"]::placeholder {
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    button {
      background: none;
      border: 1px solid var(--muted);
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      padding: 0.7rem 2rem;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
      margin-top: 0.5rem;
    }

    button:hover {
      border-color: var(--paper);
      color: var(--paper);
    }

    .error {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">B</div>
    <p class="subtitle">Private</p>
    <form method="POST" action="/login">
      <input type="password" name="password" placeholder="password" autofocus autocomplete="current-password">
      <button type="submit">Enter</button>
    </form>
    <script>
      const p = new URLSearchParams(location.search);
      if (p.get('error') === '1') {
        const el = document.createElement('p');
        el.className = 'error';
        el.textContent = 'incorrect password';
        document.querySelector('form').after(el);
      }
    </script>
  </div>
</body>
</html>
