<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B — Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .page-content.projects-content {
      max-width: 1100px;
    }
    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    .project-tile {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 2rem 1.75rem;
      border: 1px solid rgba(245,240,232,0.1);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .project-tile:hover {
      border-color: var(--accent);
      background: rgba(196,77,42,0.06);
    }
    .project-tile .post-title { transition: color 0.2s; margin: 0; }
    .project-tile:hover .post-title { color: var(--accent); }
    .project-tile .post-meta { margin: 0; }
    @media (max-width: 900px) {
      .project-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .project-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-logo">B</a>
    <ul class="nav-links">
      <li><a href="/">Photos</a></li>
      <li><a href="/blog">Blog</a></li>
      <li><a href="/prints">3D Prints</a></li>
      <li><a href="/foodmap">Food Map</a></li>
      <li><a href="/projects" class="active">Projects</a></li>
    </ul>
    <a href="/admin" class="nav-admin-link">admin</a>
  </nav>

  <main class="page-content projects-content">
    <p class="page-title">Projects</p>
    <div class="project-grid">
      <a class="project-tile" href="https://denzilly.github.io/cyrillic_trainer" target="_blank" rel="noopener">
        <h2 class="post-title">Cyrillic Trainer</h2>
        <p class="post-meta">denzilly.github.io/cyrillic_trainer</p>
      </a>
      <a class="project-tile" href="https://mktmaker.netlify.app" target="_blank" rel="noopener">
        <h2 class="post-title">Market Maker</h2>
        <p class="post-meta">mktmaker.netlify.app</p>
      </a>
      <a class="project-tile" href="https://fxtradersim.netlify.app/" target="_blank" rel="noopener">
        <h2 class="post-title">FX Trader Sim</h2>
        <p class="post-meta">fxtradersim.netlify.app</p>
      </a>
    </div>
  </main>

</body>
</html>
